    <div class="map-container markmap">
        <script type="text/template">
        # Estratégias de Marketing
        ## 1. Fundamentos (Aula 1)
        - **Conceito:** Criar, comunicar e entregar valor.
        - **4 Ps:** Produto, Preço, Praça e Promoção.
        - **Miopia de Marketing:** Foco cego no produto (esquecendo a necessidade do cliente).
        - **Mercados:** Consumidor (B2C), Organizacional (B2B), Governamental, Sem fins lucrativos.
        
        ## 2. Consumidor & Segmentação (Aulas 1 e 2)
        - **Critérios:**
          - Demográfica (idade, renda)
          - Geográfica (localização)
          - Psicográfica (estilo de vida)
          - Comportamental (hábitos)
        - **Abordagens:** Massa, Segmento, Nicho, Individual.
        - **Mapa de Empatia:** Pensa/Sente, Vê, Escuta, Fala/Faz, Dores, Desejos.
        - **Papéis de Compra:** Iniciador, Influenciador, Decisor, Comprador, Utilizador.
        
        ## 3. Ambiente & Posicionamento (Aula 2)
        - **Ambiente de Marketing:**
          - *Macro (Exógeno):* Economia, Tecnologia, Sociedade.
          - *Micro (Endógeno):* Empresa, Fornecedores, Concorrentes.
        - **Posicionamento:** O lugar que a marca ocupa na mente do consumidor.
        - **Diferenciação:** O que torna o negócio único (Atendimento, Qualidade, Inovação).
        
        ## 4. O Mix de Marketing Aprofundado (Aula 3)
        - **Produto:** - 5 Níveis (do benefício central ao potencial)
          - Ciclo de Vida (Introdução, Crescimento, Maturidade, Declínio)
        - **Preço:** Posicionamento por Imagem, Canal e Localização.
        - **Praça:** Distribuição multicanal e fluidez Omnichannel.
        - **Promoção (AIDA):**
          - Atenção
          - Interesse
          - Desejo
          - Ação
          
        ## 5. Relacionamento & Digital (Aula 4)
        - **CRM e Perfis de Valor:**
          - *Transacional:* Foco em preço, baixo vínculo.
          - *Tático:* Potencial de crescimento.
          - *Estratégico:* Alto LTV, necessita exclusividade.
        - **Inbound vs Outbound:**
          - *Inbound:* Atração passiva, conteúdo, longo prazo.
          - *Outbound:* Interrupção ativa, conversão direta, custo mais elevado.
        - **Métricas Vitais:**
          - *LTV:* Valor no ciclo de vida do cliente.
          - *CAC:* Custo de Aquisição.
          - *Churn Rate:* Taxa de abandono.
          - *NPS:* Satisfação e recomendação.
        </script>
